<!DOCTYPE html>
<html lang="en">

<head>
    <title>LecTrack - PYQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* variables based on new image reference */
        :root {
            --bg-gradient: linear-gradient(135deg, #1f353f 0%, #13252e 50%, #08151c 100%);
            --card-bg: rgba(0, 0, 0, 0.3);
            --card-border: rgba(255, 255, 255, 0.12);
            --accent-color: #ffffff;
            --text-main: #f8fafc;
            --text-muted: rgba(255, 255, 255, 0.65);
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover-bg: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .subject-dropdown {
            width: 100%;
            max-width: 450px;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 30px;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 18px top 50%;
            background-size: 14px auto;
        }

        .subject-dropdown:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        .subject-dropdown option {
            background: #13252e;
            color: var(--text-main);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--btn-border);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--btn-hover-bg);
            transform: translateY(-1px);
        }

        .nav-btn.active-btn {
            border-color: var(--accent-color);
            background: var(--btn-bg);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15);
        }

        .pyq-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 24px;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeInUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
            flex-grow: 1;
        }

        .card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .action-link {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 20px;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .preview-link {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--btn-border);
        }

        .preview-link:hover {
            background: var(--btn-hover-bg);
        }

        .download-link {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--btn-border);
        }

        .download-link:hover {
            background: var(--btn-hover-bg);
        }

        /* Loader Animation */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px dashed var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeInUp 0.5s ease backwards;
        }

        /* Custom Toast Notification */
        .toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg);
            color: var(--text-main);
            padding: 14px 24px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            font-size: 18px;
        }

        .toast-message {
            font-size: 15px;
            font-weight: 500;
        }

        /* NEW ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Applies to the title */
        .header-title span {
            display: inline-block;
            background: linear-gradient(90deg, #f8fafc, #38bdf8, #f8fafc);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientShine 4s linear infinite, float 4s ease-in-out infinite;
        }

        @keyframes gradientShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        /* Additional Subject Dropdown entrance animation */
        .subject-dropdown, .btn-group {
            animation: fadeInUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
    </style>
</head>

<body>

    <div id="toast" class="toast">
        <span class="toast-icon">⚠️</span>
        <span id="toast-message" class="toast-message">Notification</span>
    </div>

    <div class="header-title">
        <span>LecTrack PYQ</span>
    </div>

    <select id="subject" class="subject-dropdown">
        <option value="">Loading Subjects...</option>
    </select>

    <div class="btn-group">
        <button class="nav-btn" onclick="loadPYQ('aktu', this)">AKTU/CT</button>
        <button class="nav-btn" onclick="loadPYQ('mse', this)">MSE</button>
        <button class="nav-btn" onclick="loadPYQ('ese', this)">ESE</button>
        <button class="nav-btn" onclick="loadPYQ('qb', this)">QUESTION BANK</button>
    </div>

    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <div id="loaderText" style="color: var(--text-main); font-size: 15px; font-weight: 500;">Loading...</div>
    </div>

    <div id="pyqList" class="pyq-container">
        <div class="empty-state">Select a subject and type to view PYQs</div>
    </div>

    <script src="script.js"></script>

</body>

</html>
